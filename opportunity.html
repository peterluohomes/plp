<title>Appointment Centre Statistics – RE/MAX Realtron Live 24/7</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#toolbar {
  background: #323639; color: #fff; height: 48px;
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.5); z-index: 200;
}
#toolbar h1 { font-size: 13px; font-weight: 600; flex: 1; }
#pageInfo { font-size: 12px; color: #aaa; }

#viewer {
  flex: 1; overflow-y: auto; overflow-x: auto;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0; gap: 16px;
}

.page-wrap {
  position: relative; background: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  display: inline-block;
}
.page-wrap img { display: block; max-width: 100%; height: auto; }

.sig-overlay {
  position: absolute; cursor: move;
  border: 2px dashed #1a56a0; background: rgba(255,255,255,0.85);
  min-width: 160px; min-height: 56px;
  user-select: none; display: flex; align-items: center; justify-content: center;
}
.sig-overlay img { width: 100%; height: 100%; object-fit: contain; display: block; }
.sig-overlay .del-btn {
  position: absolute; top: -10px; right: -10px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #c62828; color: #fff; border: none;
  cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.sig-overlay .rsz-btn {
  position: absolute; bottom: -5px; right: -5px;
  width: 13px; height: 13px; background: #1a56a0;
  cursor: se-resize; border-radius: 2px;
}

#floatSign {
  position: fixed; bottom: 28px; right: 28px; z-index: 500;
  background: #1a56a0; color: #fff; border: none;
  width: 56px; height: 56px; border-radius: 50%;
  font-size: 22px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
#floatSign:hover { background: #1565c0; }

#sigModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 1000;
  align-items: center; justify-content: center;
}
#sigModal.open { display: flex; }
#sigBox {
  background: #fff; border-radius: 10px; padding: 24px;
  width: 460px; box-shadow: 0 8px 40px rgba(0,0,0,.4);
}
#sigBox h2 { font-size: 15px; margin-bottom: 4px; }
#sigBox p  { font-size: 12px; color: #888; margin-bottom: 14px; }
#sigCanvas {
  width: 100%; height: 150px; border: 2px solid #ccc;
  border-radius: 6px; cursor: crosshair; background: #fafafa; display: block;
}
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { padding: 8px 18px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; }
#btnApply  { background: #1a56a0; color: #fff; flex: 1; }
#btnClear  { background: #eee; color: #333; }
#btnCancel { background: #eee; color: #333; }
</style>

<button id="floatSign" title="Add Signature">✍️</button>

<div id="sigModal">
  <div id="sigBox">
    <h2>Draw Your Signature</h2>
    <p>Sign below, then drag it anywhere on the document.</p>
    <canvas id="sigCanvas" width="412" height="150"></canvas>
    <div class="modal-btns">
      <button id="btnClear">Clear</button>
      <button id="btnCancel">Cancel</button>
      <button id="btnApply">Place Signature</button>
    </div>
  </div>
</div>

<script>
const modal  = document.getElementById('sigModal');
const sigCv  = document.getElementById('sigCanvas');
const sigCtx = sigCv.getContext('2d');
let drawing  = false;

function pos(e) {
  const r = sigCv.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: (s.clientX - r.left) * (sigCv.width / r.width),
           y: (s.clientY - r.top)  * (sigCv.height / r.height) };
}
sigCv.addEventListener('pointerdown', e => {
  drawing = true; sigCtx.beginPath();
  const p = pos(e); sigCtx.moveTo(p.x, p.y);
  sigCv.setPointerCapture(e.pointerId);
});
sigCv.addEventListener('pointermove', e => {
  if (!drawing) return;
  const p = pos(e);
  sigCtx.lineWidth = 2.2; sigCtx.lineCap = 'round'; sigCtx.strokeStyle = '#111';
  sigCtx.lineTo(p.x, p.y); sigCtx.stroke();
});
sigCv.addEventListener('pointerup',    () => drawing = false);
sigCv.addEventListener('pointerleave', () => drawing = false);

document.getElementById('floatSign').onclick = () => {
  sigCtx.clearRect(0, 0, sigCv.width, sigCv.height);
  modal.classList.add('open');
};
document.getElementById('btnClear').onclick  = () => sigCtx.clearRect(0, 0, sigCv.width, sigCv.height);
document.getElementById('btnCancel').onclick = () => modal.classList.remove('open');
document.getElementById('btnApply').onclick  = () => {
  const d = sigCtx.getImageData(0, 0, sigCv.width, sigCv.height).data;
  if (!d.some(v => v !== 0)) { alert('Please draw your signature first.'); return; }
  modal.classList.remove('open');
  placeSig(sigCv.toDataURL('image/png'));
};

function placeSig(dataURL) {
  const container = document.getElementById('pageWrap');
  const ov = document.createElement('div');
  ov.className = 'sig-overlay';
  ov.style.cssText = 'left:40px;top:40px;width:180px;height:64px;';
  const img = document.createElement('img');
  img.src = dataURL;
  ov.appendChild(img);
  const del = document.createElement('button');
  del.className = 'del-btn'; del.textContent = '×';
  del.onclick = e => { e.stopPropagation(); ov.remove(); };
  ov.appendChild(del);
  const rsz = document.createElement('div');
  rsz.className = 'rsz-btn';
  ov.appendChild(rsz);
  container.appendChild(ov);
  makeDraggable(ov, container);
  makeResizable(ov, rsz);
}

function makeDraggable(el, container) {
  let sx, sy, ox, oy;
  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('del-btn') || e.target.classList.contains('rsz-btn')) return;
    e.preventDefault();
    sx = e.clientX; sy = e.clientY; ox = el.offsetLeft; oy = el.offsetTop;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e => {
    if (e.buttons !== 1) return;
    el.style.left = Math.max(0, Math.min(ox + e.clientX - sx, container.offsetWidth  - el.offsetWidth))  + 'px';
    el.style.top  = Math.max(0, Math.min(oy + e.clientY - sy, container.offsetHeight - el.offsetHeight)) + 'px';
  });
}

function makeResizable(el, handle) {
  handle.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    const sw = el.offsetWidth, sh = el.offsetHeight, sx = e.clientX, sy = e.clientY;
    handle.setPointerCapture(e.pointerId);
    function onMove(ev) {
      el.style.width  = Math.max(80,  sw + ev.clientX - sx) + 'px';
      el.style.height = Math.max(30,  sh + ev.clientY - sy) + 'px';
    }
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', () => handle.removeEventListener('pointermove', onMove), { once: true });
  });
}
</script>
</body>
