<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showing Feedback</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ede8;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #111;
    padding: 32px 24px 48px;
  }

  /* ── HEADER ── */
  .header {
    max-width: 1200px;
    margin: 0 auto 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1b2d4e;
    letter-spacing: 0.01em;
  }
  .header p {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  /* ── QUESTIONS BAR ── */
  .questions {
    max-width: 1200px;
    margin: 0 auto 20px;
    background: #fff;
    border: 1px solid #c8c0b4;
    border-left: 4px solid #1b2d4e;
    padding: 14px 18px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .q-item {
    font-size: 11.5px;
    color: #444;
    line-height: 1.5;
    flex: 1;
    min-width: 220px;
  }
  .q-item strong {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #b8922a;
    margin-bottom: 3px;
    font-weight: 600;
  }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border: 1.5px solid #000;
    overflow: hidden;
  }

  /* ── TABLE ── */
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  col.c-date   { width: 72px; }
  col.c-time   { width: 62px; }
  col.c-brk    { width: 150px; }
  col.c-agent  { width: 140px; }
  col.c-fdbk   { width: auto; }
  col.c-status { width: 52px; }

  /* Header row */
  thead tr {
    background: #000;
  }
  thead th {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    padding: 9px 8px;
    text-align: left;
    letter-spacing: 0.04em;
    border-right: 1px solid #333;
  }
  thead th:last-child { border-right: none; }

  /* Body rows */
  tbody tr {
    border-bottom: 1px solid #ccc;
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f7f4ef; }
  tbody tr.highlight { background: #fffbf0; }

  tbody td {
    padding: 7px 8px;
    vertical-align: middle;
    border-right: 1px solid #ddd;
    line-height: 1.45;
    font-size: 12.5px;
  }
  tbody td:last-child { border-right: none; }

  /* Date cell */
  .td-date {
    font-weight: 600;
    color: #333;
    white-space: nowrap;
  }

  /* Time cell */
  .td-time {
    color: #555;
    white-space: nowrap;
  }

  /* Brokerage cell */
  .td-brk {
    font-size: 11.5px;
    color: #222;
    font-weight: 500;
  }

  /* Agent cell */
  .td-agent {
    font-size: 12px;
    color: #333;
  }

  /* Feedback cell */
  .td-fdbk {
    font-size: 12.5px;
    color: #222;
    line-height: 1.5;
  }

  /* Status badge */
  .td-status {
    text-align: center;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    line-height: 26px;
    border-radius: 2px;
    text-align: center;
  }
  .badge-F { background: #e8f0e8; color: #2d6a2d; border: 1px solid #b0d0b0; }
  .badge-O { background: #fff3e0; color: #b35c00; border: 1px solid #f0c070; }
  .badge-N { background: #f0f0f0; color: #555;    border: 1px solid #ccc; }

  /* ── SUMMARY BAR ── */
  .summary {
    max-width: 1200px;
    margin: 16px auto 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #fff;
    border: 1px solid #c8c0b4;
    padding: 12px 20px;
    text-align: center;
    min-width: 120px;
  }
  .summary-val {
    font-size: 26px;
    font-weight: 700;
    color: #1b2d4e;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-lbl {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    font-weight: 500;
  }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: #fff; padding: 0; }
    .questions { display: none; }
    .summary { display: none; }
  }

  /* ── SEARCH/FILTER BAR ── */
  .toolbar {
    max-width: 1200px;
    margin: 0 auto 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar input {
    flex: 1;
    min-width: 180px;
    padding: 7px 12px;
    border: 1px solid #c8c0b4;
    background: #fff;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .toolbar input:focus { border-color: #1b2d4e; }
  .toolbar select {
    padding: 7px 10px;
    border: 1px solid #c8c0b4;
    background: #fff;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }
  .btn-print {
    padding: 7px 18px;
    background: #1b2d4e;
    color: #fff;
    border: none;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-print:hover { background: #243859; }
</style>
</head>
<body>

<div class="header">
  <h1>Showing Feedback</h1>

</div>

<!-- AGENT QUESTIONS -->
<div class="questions">
  <div class="q-item">
    <strong>Q1</strong>
    What do your buyers think about the house?
  </div>
  <div class="q-item">
    <strong>Q2</strong>
    What can I do to help you win the deal?
  </div>
  <div class="q-item">
    <strong>Q3</strong>
    How would you explain it to your buyer if the house is sold at asking price?
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Search feedback, agent, brokerage…" oninput="filterTable()">
  <select id="statusFilter" onchange="filterTable()">
    <option value="">All Status</option>
    <option value="F">F — Following Up</option>
    <option value="O">O — Offer Likely</option>
    <option value="N">N — Not Interested</option>
  </select>
  <button class="btn-print" onclick="window.print()">Print</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="feedbackTable">
    <colgroup>
      <col class="c-date">
      <col class="c-time">
      <col class="c-brk">
      <col class="c-agent">
      <col class="c-fdbk">
      <col class="c-status">
    </colgroup>
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Brokerage</th>
        <th>Agent</th>
        <th>Feedback</th>
        <th style="text-align:center;">Status</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
</div>

<!-- SUMMARY -->
<div class="summary" id="summary"></div>

<script>
const rows = [
  { date:"Mar-25", time:"12:00", brk:"C21 ATRIA",         agent:"Alexander Wu",       fdbk:"May give offer, wife like/husband doesn't, need to check again",          status:"F" },
  { date:"Mar-25", time:"2:15",  brk:"AIMHOME",           agent:"KASRA",              fdbk:"Buyers don't want to too high, will check with buyer, need to check again",status:"F" },
  { date:"Mar-25", time:"2:15",  brk:"SINCERE REALTY",    agent:"CHARLIE ZHAO",       fdbk:"Call again",                                                              status:"F" },
  { date:"Mar-25", time:"5:30",  brk:"RE/MAX IMPERIAL",   agent:"HUGO YOU",           fdbk:"Will discuss with buyer. Call again",                                      status:"F" },
  { date:"Mar-25", time:"6:00",  brk:"EVERLAND REALTY",   agent:"RACHEL WANG",        fdbk:"Layout is a main issue, will call buyer again",                           status:"F" },
  { date:"Mar-25", time:"6:45",  brk:"HL Landmark",       agent:"Better Deng",        fdbk:"May give offer → O",                                                      status:"O" },
  { date:"Mar-26", time:"11:30", brk:"HL Landmark",       agent:"SOPHIA SHANG",       fdbk:"Want to know the number of offers then make decision",                     status:"F" },
  { date:"Mar-26", time:"12:00", brk:"RIGHT AT HOME",     agent:"MOHAMMAD",           fdbk:"Buyer's range 1.5 million",                                               status:"F" },
  { date:"Mar-26", time:"1:30",  brk:"HL Landmark",       agent:"STELLA LI",          fdbk:"Buyer doesn't want to do reno. Will call again",                          status:"F" },
  { date:"Mar-27", time:"11:00", brk:"CULTURELINK",       agent:"KWEN SHIU LEUNG",    fdbk:"Will put an offer",                                                       status:"O" },
  { date:"Mar-27", time:"11:00", brk:"HOMECOMFORT",       agent:"MICHAEL LIN",        fdbk:"Buyer purchased another property",                                        status:"N" },
  { date:"Mar-27", time:"11:15", brk:"Real On",           agent:"VICTOR GENG",        fdbk:"Not sure yet, buyer needs to sell their house",                           status:"F" },
  { date:"Mar-27", time:"1:00",  brk:"—",                 agent:"JASON GAO",          fdbk:"Buyer doesn't like the main floor layout",                                status:"F" },
  { date:"Mar-27", time:"2:45",  brk:"NU Stream",         agent:"MELODY WANG",        fdbk:"Buyer looking in large area, not looking for good school, looking for newer house", status:"N" },
  { date:"Mar-27", time:"4:00",  brk:"TOP CANADIAN",      agent:"MUTAZ",              fdbk:"Will talk to buyer",                                                      status:"F" },
];

function badgeHTML(s) {
  const cls = s === 'F' ? 'badge-F' : s === 'O' ? 'badge-O' : 'badge-N';
  return `<span class="badge ${cls}">${s}</span>`;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (r.status === 'O') tr.classList.add('highlight');
    tr.innerHTML = `
      <td class="td-date">${r.date}</td>
      <td class="td-time">${r.time}</td>
      <td class="td-brk">${r.brk}</td>
      <td class="td-agent">${r.agent}</td>
      <td class="td-fdbk">${r.fdbk}</td>
      <td class="td-status">${badgeHTML(r.status)}</td>
    `;
    tbody.appendChild(tr);
  });
  renderSummary(data);
}

function renderSummary(data) {
  const total = data.length;
  const offer = data.filter(r => r.status === 'O').length;
  const followUp = data.filter(r => r.status === 'F').length;
  const notInt = data.filter(r => r.status === 'N').length;

  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="summary-val">${total}</div><div class="summary-lbl">Total Showings</div></div>
    <div class="summary-card"><div class="summary-val" style="color:#b35c00;">${offer}</div><div class="summary-lbl">Offer Likely (O)</div></div>
    <div class="summary-card"><div class="summary-val" style="color:#2d6a2d;">${followUp}</div><div class="summary-lbl">Following Up (F)</div></div>
    <div class="summary-card"><div class="summary-val" style="color:#888;">${notInt}</div><div class="summary-lbl">Not Interested (N)</div></div>
  `;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const filtered = rows.filter(r => {
    const matchText = !q || [r.date, r.time, r.brk, r.agent, r.fdbk].join(' ').toLowerCase().includes(q);
    const matchStatus = !s || r.status === s;
    return matchText && matchStatus;
  });
  renderTable(filtered);
}

// Initial render
renderTable(rows);
</script>

</body>
</html>
